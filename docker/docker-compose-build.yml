services:
    portal:
        build:
            context: .
            args:
                DHIS2_BASE_PAT_TOKEN: ${DHIS2_BASE_PAT_TOKEN}
                DHIS2_BASE_URL: ${DHIS2_BASE_URL}
                NEXT_PUBLIC_CONTEXT_PATH: ${NEXT_PUBLIC_CONTEXT_PATH}
        user: '1001:1001'
        ports:
            - '${PORTAL_PORT:-3000}:3000'
        env_file:
            - ./apps/portal/.env
networks:
    default:
        name: portal-network
        driver: bridge
